services:
  db:
    image: postgres:15-alpine
    container_name: github_notifier_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: github_notifier
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: github_notifier_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  pgdata:
