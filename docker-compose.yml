services:
  db:
    image: postgres:15-alpine
    container_name: github_notifier_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_INITDB_ARGS: "--locale=C"
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: github_notifier_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  app:
    build: .
    container_name: github_notifier_app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    command: sh -c "npx prisma migrate deploy && npm run start"

  worker:
    build: .
    container_name: github_notifier_worker
    restart: unless-stopped
    depends_on:
      - redis
      - db
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    command: npm run start:worker

volumes:
  pgdata:
